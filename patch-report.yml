---
- name: Patch status rapport Linux servers
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Check become user
      become: true
      ansible.builtin.command: whoami
      register: whoami_result
      changed_when: false

    - name: Show become user
      ansible.builtin.debug:
        var: whoami_result.stdout

    - name: Update apt cache
      become: true
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      changed_when: false
      when: ansible_os_family == "Debian"

    - name: Count available updates
      ansible.builtin.shell: apt list --upgradable 2>/dev/null | tail -n +2 | wc -l
      register: update_count
      changed_when: false
      when: ansible_os_family == "Debian"

    - name: Count security updates
      ansible.builtin.shell: apt list --upgradable 2>/dev/null | grep -Ei "security|ubuntu-security" | wc -l
      register: security_count
      changed_when: false
      when: ansible_os_family == "Debian"

    - name: Check reboot required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Build CSV report
      ansible.builtin.set_fact:
        patch_report_line: "{{ inventory_hostname }};{{ ansible_default_ipv4.address | default('n/a') }};{{ ansible_distribution }} {{ ansible_distribution_version }};{{ ansible_kernel }};{{ update_count.stdout | default('n/a') }};{{ security_count.stdout | default('n/a') }};{{ reboot_required.stat.exists }}"

    - name: Show CSV report
      run_once: true
      delegate_to: localhost
      ansible.builtin.debug:
        msg: |
          Server;IP;OS;Kernel;Updates;Security updates;Reboot nodig
          {% for host in ansible_play_hosts %}
          {{ hostvars[host].patch_report_line }}
          {% endfor %}
          
    - name: Create HTML patch report
      run_once: true
      delegate_to: 10.84.20.25
      ansible.builtin.copy:
        dest: /var/tmp/linux-patch-report.html
        mode: '0640'
        content: |
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Linux Patch Report</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 30px; }
              table { border-collapse: collapse; width: 100%; }
              th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
              th { background: #f2f2f2; }
              .high { background: #ffd6d6; }
              .medium { background: #fff3cd; }
              .ok { background: #d4edda; }
            </style>
          </head>
          <body>
            <h1>Linux Patch Report</h1>
            <p>Gegenereerd: {{ ansible_date_time.date }} {{ ansible_date_time.time }}</p>

            <table>
              <tr>
                <th>Server</th>
                <th>IP</th>
                <th>OS</th>
                <th>Kernel</th>
                <th>Updates</th>
                <th>Security updates</th>
                <th>Reboot nodig</th>
              </tr>
              {% for host in ansible_play_hosts %}
              <tr class="{% if hostvars[host].security_count.stdout | int > 20 %}high{% elif hostvars[host].security_count.stdout | int > 0 %}medium{% else %}ok{% endif %}">
                <td>{{ host }}</td>
                <td>{{ hostvars[host].ansible_default_ipv4.address | default('n/a') }}</td>
                <td>{{ hostvars[host].ansible_distribution }} {{ hostvars[host].ansible_distribution_version }}</td>
                <td>{{ hostvars[host].ansible_kernel }}</td>
                <td>{{ hostvars[host].update_count.stdout | default('n/a') }}</td>
                <td>{{ hostvars[host].security_count.stdout | default('n/a') }}</td>
                <td>{{ hostvars[host].reboot_required.stat.exists }}</td>
              </tr>
              {% endfor %}
            </table>
          </body>
          </html>
